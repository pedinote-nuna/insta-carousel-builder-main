<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>소아과언니 견본 · 팔레트 A · Cover</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    /* 팔레트 A — Editorial Coral (knowledge/brand-facts.md) */
    --bg:#FAFAF7;
    --text:#1A1F36;
    --accent:#C44536;
    --secondary:#5B7C99;
  }
  body{
    width:1080px; height:1350px;
    background:var(--bg);
    font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
    color:var(--text);
    overflow:hidden;
    position:relative;
  }
  .accent-bar{
    position:absolute; left:0; top:0;
    width:14px; height:100%;
    background:var(--accent);
  }
  .top-label{
    position:absolute; left:80px; top:88px;
    font-size:22px; font-weight:700;
    letter-spacing:0.08em;
    color:var(--secondary);
  }
  .headline-block{
    position:absolute; left:80px; bottom:240px;
    max-width:920px;
  }
  .headline{
    font-size:108px; font-weight:900;
    line-height:1.08;
    letter-spacing:-0.02em;
  }
  .headline .accent{ color:var(--accent); }
  .subline{
    margin-top:32px;
    font-size:30px; font-weight:400;
    color:var(--secondary);
    letter-spacing:-0.01em;
  }
  .footer{
    position:absolute; left:80px; right:80px; bottom:48px;
    display:flex; justify-content:space-between; align-items:center;
    font-size:22px; font-weight:500;
    color:var(--secondary);
  }
  .footer .badge::before{
    content:"✓"; color:var(--accent); margin-right:8px; font-weight:900;
  }
</style>
</head>
<body data-claim-ids="">
  <div class="accent-bar"></div>

  <div class="top-label">@SOAGWA_UNNIE · 부모님 가이드</div>

  <div class="headline-block">
    <div class="headline">우리 아이</div>
    <div class="headline">이유식 시작</div>
    <div class="headline">5가지 <span class="accent">신호.</span></div>
    <div class="subline">4~6개월 사이, 놓치지 마세요.</div>
  </div>

  <div class="footer">
    <span class="badge">소아청소년과 전문의 검수</span>
    <span>01 / 09</span>
  </div>
</body>
</html>
